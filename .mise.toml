[tools]
node = "24"
pnpm = "10"
fnox = "latest"

[tasks.all]
description = "Run all checks, tests, and build sequentially"
run = [
  "mise run check",
  "mise run test",
  "mise run build"
]

[tasks.dev]
description = "Start the Next.js development server with Turbopack"
run = "fnox exec -- pnpm run dev"

[tasks.build]
description = "Build the application for production"
run = "fnox exec -- pnpm run build"

[tasks.clean]
description = "Remove build artifacts and cached files"
run = "rm -rf .next storybook-static dist"

[tasks.test]
description = "Run all tests"
run = "mise -E test exec -- fnox exec -- pnpm run -s test"

[tasks.check]
description = "Run all checks (lint, typecheck, format, knip)"
run = "fnox exec -- pnpm run -s check"

[tasks.format]
description = "Format code using Prettier"
run = "fnox exec -- pnpm run -s format"

[tasks.lint]
description = "Run ESLint"
run = "fnox exec -- pnpm run -s lint"

[tasks.typecheck]
description = "Run TypeScript type checks"
run = "fnox exec -- pnpm run -s typecheck"

[tasks.storybook]
description = "Start Storybook development server"
run = "fnox exec -- pnpm run storybook"

[tasks.sanity]
description = "Run sanity commands"
run = "fnox exec -- pnpm sanity {{args}}"

[tasks.migrate]
description = "Run a Sanity content migration (usage: mise run migrate -- <migration-name>)"
run = "fnox exec -- npx sanity@latest migration run {{args}}"

[tasks.migrate-create]
description = "Create a new Sanity migration (usage: mise run migrate-create -- \"description\")"
run = "fnox exec -- npx sanity@latest migration create {{args}}"

[tasks.migrate-validate]
description = "Validate documents against current schema"
run = "fnox exec -- npx sanity@latest documents validate -y"

[tasks.lint-fix]
description = "Run ESLint with auto-fix"
run = "fnox exec -- pnpm run -s lint:fix"

[tasks.test-watch]
description = "Run tests in watch mode"
run = "mise -E test exec -- fnox exec -- pnpm run test:watch"

[tasks.test-badges]
description = "Run badge-specific tests"
run = "mise -E test exec -- fnox exec -- pnpm run test:badges"

[tasks.storybook-test]
description = "Build and test Storybook stories (CI mode)"
run = "fnox exec -- pnpm run storybook:test-ci"

[tasks.manage-files]
description = "Manage orphaned uploaded files"
run = "fnox exec -- pnpm run manage-orphaned-files"

[tasks.install]
description = "Install dependencies"
run = "pnpm install"

[env]
NEXT_TELEMETRY_DISABLED = "1"
NEXT_PUBLIC_SANITY_PROJECT_ID = "mvzwvw14"
NEXT_PUBLIC_SANITY_DATASET = "production"
SANITY_STUDIO_PROJECT_ID = "mvzwvw14"
SANITY_STUDIO_DATASET = "production"


